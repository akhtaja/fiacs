<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Counting Fun!</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:linear-gradient(135deg,#f6d365,#fda085);
    background-attachment:fixed;
    min-height:100vh;
    padding:15px;
    overflow-x:hidden;
}

h1{
    text-align:center;
    font-size:2rem;
    color:#fff;
    text-shadow:0 2px 8px rgba(0,0,0,.2);
    margin-bottom:20px;
}

.container{
    max-width:500px;
    margin:0 auto;
}

/* Number display */
.number-display{
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 50px rgba(0,0,0,.15);
    margin-bottom:20px;
}

.big-number{
    font-size:12rem;
    font-weight:bold;
    color:#ff6b6b;
    text-shadow:3px 3px 0 #feca57;
    animation:popIn .4s ease;
    line-height:1;
}

.number-word{
    font-size:2.5rem;
    color:#5f27cd;
    font-weight:bold;
    margin-top:10px;
}

.number-dots{
    margin:15px 0;
    font-size:2.2rem;
    line-height:1.8;
}

/* Buttons */
.controls{
    display:flex;
    gap:12px;
    justify-content:center;
    margin:20px 0;
}

.btn{
    border:none;
    border-radius:50%;
    width:70px;height:70px;
    font-size:2rem;
    cursor:pointer;
    transition:transform .2s,box-shadow .2s;
    box-shadow:0 6px 20px rgba(0,0,0,.15);
}

.btn:hover{transform:scale(1.1) translateY(-3px)}
.btn:active{transform:scale(.95)}

.btn-prev{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff}
.btn-next{background:linear-gradient(135deg,#55efc4,#00b894);color:#fff}
.btn-speak{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff}
.btn-play{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}
.btn-play.playing{background:linear-gradient(135deg,#d63031,#e17055);color:#fff}
.btn-lang{background:linear-gradient(135deg,#dfe6e9,#b2bec3);color:#2d3436;font-size:1.4rem}

/* Number grid */
.custom-input{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:15px 0;
}

.custom-input input{
    width:140px;
    padding:12px 16px;
    border:2px solid #ddd;
    border-radius:14px;
    font-size:18px;
    text-align:center;
    font-weight:bold;
    background:#fff;
}

.custom-input input:focus{
    outline:none;
    border-color:#6c5ce7;
    box-shadow:0 0 0 4px rgba(108,92,231,.15);
}

.grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:5px;
    margin-top:15px;
}

.grid-num{
    background:rgba(255,255,255,.9);
    border-radius:10px;
    padding:6px 2px;
    text-align:center;
    font-size:.9rem;
    font-weight:bold;
    color:#6c5ce7;
    cursor:pointer;
    transition:transform .2s,background .2s;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.grid-num:hover{transform:scale(1.1);background:#dfe6e9}
.grid-num.active{background:linear-gradient(135deg,#ff6b6b,#feca57);color:#fff;transform:scale(1.1)}

/* Progress */
.progress-bar{
    background:rgba(255,255,255,.4);
    border-radius:20px;
    height:12px;
    margin:15px 0;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    border-radius:20px;
    background:linear-gradient(90deg,#6c5ce7,#a29bfe);
    transition:width .4s ease;
}

/* Animation */
@keyframes popIn{
    0%{transform:scale(.5);opacity:0}
    60%{transform:scale(1.2)}
    100%{transform:scale(1);opacity:1}
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
}

.celebrating .big-number{
    animation:bounce .3s ease 3;
}

/* Floaters */
.floaters{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.floater{position:absolute;opacity:.2;animation:floatAcross linear infinite}
/* Sidebar menu */
.menu-toggle{
    position:fixed;top:15px;left:15px;z-index:100;
    background:rgba(255,255,255,.9);border:none;border-radius:12px;
    width:44px;height:44px;font-size:22px;cursor:pointer;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
    transition:transform .2s;
}
.menu-toggle:hover{transform:scale(1.1)}

.sidebar{
    position:fixed;top:0;left:-260px;width:250px;height:100%;
    background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
    z-index:99;padding:70px 20px 20px;
    box-shadow:4px 0 30px rgba(0,0,0,.15);
    transition:left .3s ease;border-radius:0 20px 20px 0;
}
.sidebar.open{left:0}
.sidebar a{
    display:block;padding:14px 16px;margin:6px 0;
    border-radius:12px;text-decoration:none;
    font-size:15px;font-weight:600;color:#4a1a7a;
    transition:background .2s;
}
.sidebar a:hover{background:#f0e6ff}
.sidebar a.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.3);z-index:98;display:none;
}
.overlay.open{display:block}

@keyframes floatAcross{from{transform:translateX(-50px)}to{transform:translateX(calc(100vw + 50px))}}

@media(max-width:400px){
    .big-number{font-size:8rem}
    .number-word{font-size:2rem}
    .btn{width:55px;height:55px;font-size:1.4rem}
    .grid-num{font-size:.8rem;padding:5px 2px}
}
</style>
</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <a href="kids.html">🏝️ Adventure Quest</a>
    <a href="counting.html" class="active">🔢 Counting</a>
</div>

<div class="floaters">
    <div class="floater" style="top:10%;animation-duration:20s;font-size:30px">🔢</div>
    <div class="floater" style="top:40%;animation-duration:26s;animation-delay:5s;font-size:26px">⭐</div>
    <div class="floater" style="top:70%;animation-duration:22s;animation-delay:10s;font-size:28px">🎈</div>
    <div class="floater" style="top:25%;animation-duration:30s;animation-delay:8s;font-size:24px">🌟</div>
    <div class="floater" style="top:85%;animation-duration:24s;animation-delay:3s;font-size:30px">🎉</div>
</div>

<div class="container">
    <h1>🔢 Counting Fun!</h1>

    <div class="number-display" id="display">
        <div class="big-number" id="bigNum">1</div>
        <div class="number-word" id="word">One</div>
        <div class="number-dots" id="dots">🟡</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:5%"></div>
    </div>

    <div class="controls">
        <button class="btn btn-prev" onclick="go(-1)">◀</button>
        <button class="btn btn-speak" onclick="speak()">🔊</button>
        <button class="btn btn-play" id="playBtn" onclick="toggleAutoPlay()">▶️</button>
        <button class="btn btn-next" onclick="go(1)">▶</button>
        <button class="btn btn-lang" id="langBtn" onclick="toggleLang()">🇬🇧</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customNum" placeholder="Type a number" min="0">
        <button class="btn btn-speak" onclick="speakCustom()">🔊</button>
    </div>

    <div class="grid" id="grid"></div>
</div>

<script>

function toggleMenu(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
}

const words={
    en:['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
        'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen','Twenty'],
    nl:['','Een','Twee','Drie','Vier','Vijf','Zes','Zeven','Acht','Negen','Tien',
        'Elf','Twaalf','Dertien','Veertien','Vijftien','Zestien','Zeventien','Achttien','Negentien','Twintig']
};

let lang = localStorage.getItem('counting_lang') || 'en';
let current=1;

function go(dir){
    current+=dir;
    if(current<1) current=20;
    if(current>20) current=1;
    updateDisplay();
}

function jumpTo(n){
    current=n;
    updateDisplay();
}

function updateDisplay(){
    const display=document.getElementById('display');
    document.getElementById('bigNum').textContent=current;
    document.getElementById('word').textContent=words[lang][current];
    document.getElementById('dots').textContent='🟡'.repeat(current);
    document.getElementById('progress').style.width=(current/20*100)+'%';

    // Animate
    display.classList.remove('celebrating');
    void display.offsetWidth;
    display.classList.add('celebrating');
    document.getElementById('bigNum').style.animation='none';
    void document.getElementById('bigNum').offsetWidth;
    document.getElementById('bigNum').style.animation='popIn .4s ease';

    // Update grid
    document.querySelectorAll('.grid-num').forEach(el=>{
        el.classList.toggle('active',parseInt(el.dataset.n)===current);
    });
}

// Pre-load voices (needed for Safari/Edge)
let _voices=[];
if('speechSynthesis' in window){
    _voices=speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged=()=>{ _voices=speechSynthesis.getVoices(); };
}

function speakText(text){
    const ttsLang = lang==='nl' ? 'nl' : 'en';
    const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${ttsLang}&q=${encodeURIComponent(text)}`);
    audio.play().catch(()=>{
        if(!('speechSynthesis' in window)) return;
        speechSynthesis.cancel();
        const u=new SpeechSynthesisUtterance(text);
        const voice=_voices.find(v=>v.lang.startsWith(ttsLang));
        if(voice) u.voice=voice;
        u.lang=lang==='nl'?'nl-NL':'en-GB';
        u.rate=0.7;
        speechSynthesis.speak(u);
    });
}

function speak(){
    speakText(words[lang][current]);
}

function speakCustom(){
    const num=parseInt(document.getElementById('customNum').value);
    if(isNaN(num)||num<0){ return; }
    const text=numToWord(num,lang);
    speakText(text);
}

function numToWord(n,lng){
    if(n<=20 && words[lng][n]) return words[lng][n];
    // For numbers > 20, just speak the number (TTS handles it)
    return String(n);
}

function toggleLang(){
    lang = lang==='en' ? 'nl' : 'en';
    localStorage.setItem('counting_lang', lang);
    document.getElementById('langBtn').textContent = lang==='en' ? '🇬🇧' : '🇳🇱';
    updateDisplay();
}

let autoPlayTimer=null;

function toggleAutoPlay(){
    const btn=document.getElementById('playBtn');
    if(autoPlayTimer){
        clearInterval(autoPlayTimer);
        autoPlayTimer=null;
        btn.textContent='▶️';
        btn.classList.remove('playing');
    } else {
        btn.textContent='⏸️';
        btn.classList.add('playing');
        speak();
        autoPlayTimer=setInterval(()=>{
            go(1);
            speak();
        },5000);
    }
}

let _lastTone=0;
function playTone(freq){
    const now=Date.now();
    if(now-_lastTone<100) return;
    _lastTone=now;
    if(!window._audioCtx) window._audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const ctx=window._audioCtx;
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
    o.start();o.stop(ctx.currentTime+.12);
}

// Build grid
const grid=document.getElementById('grid');
for(let i=1;i<=20;i++){
    const el=document.createElement('div');
    el.className='grid-num'+(i===1?' active':'');
    el.dataset.n=i;
    el.textContent=i;
    el.onclick=()=>jumpTo(i);
    grid.appendChild(el);
}

// Set initial lang button
document.getElementById('langBtn').textContent = lang==='en' ? '🇬🇧' : '🇳🇱';

</script>
</body>
</html>
